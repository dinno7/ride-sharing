services:
  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: ./infra/development/docker/go.Dockerfile
      args:
        - SERVICE_NAME=api-gateway
    ports:
      - 7000:7000
    volumes:
      - ./services/api-gateway/:/data/services/api-gateway/
      - ./shared/:/data/shared/

  trip-service:
    container_name: trip-service
    build:
      context: .
      dockerfile: ./infra/development/docker/go.Dockerfile
      args:
        - SERVICE_NAME=trip-service
    ports:
      - 7001:7000
    volumes:
      - ./services/trip-service/:/data/services/trip-service/
      - ./shared/:/data/shared/

  web:
    container_name: web
    build:
      context: .
      dockerfile: ./infra/development/docker/web.Dockerfile
    depends_on:
      - api-gateway
    ports:
      - 3000:3000

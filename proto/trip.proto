syntax = "proto3";

package trip;

option go_package = "shared/proto/trip;trip";

service TripService {
  rpc PreviewTrip(PreviewTripRequest) returns (PreviewTripResponse);
  rpc StartTrip(StartTripRequest) returns (StartTripResponse);
}

message PreviewTripRequest {
  string userID = 1;
  Cordinate startLocation = 2;
  Cordinate endLocation = 3;
}

message PreviewTripResponse {
  Route route = 2;
  repeated RideFare rideFares = 3;
}

message Route {
  repeated Geometry geometry = 1;
  double distance = 2;
  double duration = 3;
}

message RideFare {
  string ID = 1;
  string userID = 2;
  string packageSlug = 3;
  double totalPriceInCents = 4;
}

message Geometry { repeated Cordinate cordinates = 1; }

message Cordinate {
  double latitude = 1;
  double longitude = 2;
}

message StartTripRequest {
  string rideFareID = 1;
  string userID = 2;
}

message StartTripResponse {
  string tripID = 1;
  Trip trip = 2;
}

message Trip {
  string ID = 1;
  RideFare selectedRideFare = 2;
  Route route = 3;
  string status = 4;
  string userID = 5;
  TripDriver driver = 6;
}

message TripDriver {
  string id = 1;
  string name = 2;
  string profilePicture = 3;
  string carPlate = 4;
}
